# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - credsFilePath
      - tokenPath
    properties:
      credsFilePath:
        type: string
        description: The path to the OAuth 2.0 credentials JSON file.
      tokenPath:
        type: string
        description: The path to the file where access and refresh tokens will be stored.
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'python', args: ['src/gmail/server.py', '--creds-file-path', config.credsFilePath, '--token-path', config.tokenPath] })
